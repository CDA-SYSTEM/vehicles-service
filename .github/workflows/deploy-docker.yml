name: Deploy Spring Boot Docker

on:
  push:
    branches: [ "main", "feat/config-deploy" ]
  pull_request:
    branches: [ "main" ]

permissions:
  packages: write
  contents: read

jobs:
  deploy-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set repository name to lowercase
        run: echo "REPO_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}:latest
            ghcr.io/${{ env.REPO_LC }}:${{ github.sha }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.REMOTE_PORT }}
          script: |
            # Iniciar sesión en GHCR desde el servidor
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Descargar la última imagen
            docker pull ghcr.io/${{ env.REPO_LC }}:latest

            # Detener y eliminar contenedor existente
            docker stop vehicles-service || true
            docker rm vehicles-service || true

            # Iniciar nuevo contenedor
            docker run -d \
              --name vehicles-service \
              -p ${{ secrets.SERVER_PORT }}:${{ secrets.SERVER_PORT }} \
              -e SERVER_PORT="${{ secrets.SERVER_PORT }}" \
              -e SPRING_DATASOURCE_URL="${{ secrets.SPRING_DATASOURCE_URL }}" \
              -e SPRING_DATASOURCE_USERNAME="${{ secrets.SPRING_DATASOURCE_USERNAME }}" \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.SPRING_DATASOURCE_PASSWORD }}" \
              -e SPRING_DATASOURCE_DRIVER_CLASS_NAME="${{ secrets.SPRING_DATASOURCE_DRIVER_CLASS_NAME }}" \
              -e SPRING_JPA_HIBERNATE_DDL_AUTO="${{ secrets.SPRING_JPA_HIBERNATE_DDL_AUTO }}" \
              -e SPRING_JPA_SHOW_SQL="${{ secrets.SPRING_JPA_SHOW_SQL }}" \
              -e SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL="${{ secrets.SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL }}" \
              -e SPRING_JPA_PROPERTIES_HIBERNATE_BOOT_ALLOW_JDBC_METADATA_ACCESS="${{ secrets.SPRING_JPA_PROPERTIES_HIBERNATE_BOOT_ALLOW_JDBC_METADATA_ACCESS }}" \
              -e SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT="${{ secrets.SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT }}" \
              -e SPRING_FLYWAY_ENABLED="${{ secrets.SPRING_FLYWAY_ENABLED }}" \
              -e SPRING_FLYWAY_LOCATIONS="${{ secrets.SPRING_FLYWAY_LOCATIONS }}" \
              -e SPRING_FLYWAY_BASELINE_ON_MIGRATE="${{ secrets.SPRING_FLYWAY_BASELINE_ON_MIGRATE }}" \
              -e RABBITMQ_HOST="${{ secrets.RABBITMQ_HOST }}" \
              -e RABBITMQ_PORT="${{ secrets.RABBITMQ_PORT }}" \
              -e RABBITMQ_QUEUE_USER="${{ secrets.RABBITMQ_QUEUE_USER }}" \
              -e RABBITMQ_PASSWORD="${{ secrets.RABBITMQ_PASSWORD }}" \
              -e RABBITMQ_VHOST="${{ secrets.RABBITMQ_VHOST }}" \
              -e RABBITMQ_VEHICLE_QUEUE="${{ secrets.RABBITMQ_VEHICLE_QUEUE }}" \
              -e RABBITMQ_RPC_TIMEOUT_MS="${{ secrets.RABBITMQ_RPC_TIMEOUT_MS }}" \
              --restart unless-stopped \
              ghcr.io/${{ env.REPO_LC }}:latest

            # Limpiar imágenes antiguas
            docker image prune -f
